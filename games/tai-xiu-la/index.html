<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tài Xỉu 4 Lá</title>
<style>
:root {
  --red: #c0392b;
  --red-dark: #922b21;
  --black: #1a1a2e;
  --gold: #f0c040;
  --gold-light: #f8e08a;
  --felt: #1a5c38;
  --felt-dark: #0f3d24;
  --cream: #fdf6e3;
  --shadow: rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: radial-gradient(ellipse at 50% 0%, #2d1b0e 0%, #0f0a05 100%);
  min-height: 100vh;
  color: var(--cream);
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
header {
  text-align: center;
  padding: 20px 16px 10px;
  width: 100%;
}
h1 {
  font-family: "Times New Roman", Georgia, serif;
  font-size: clamp(28px, 7vw, 48px);
  color: var(--gold-light);
  text-shadow: 0 0 20px rgba(240,192,64,.5), 0 3px 0 var(--red-dark);
  letter-spacing: .04em;
}
h1 small {
  display: block;
  font-size: .32em;
  letter-spacing: .5em;
  color: var(--gold);
  font-family: system-ui;
  margin-top: 4px;
  text-transform: uppercase;
}

/* ── Stats bar ── */
.topbar {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 10px 0;
  padding: 0 16px;
}
.pill {
  background: rgba(0,0,0,.35);
  border: 1px solid var(--gold);
  border-radius: 999px;
  padding: 6px 16px;
  font-size: 13px;
  display: flex;
  gap: 8px;
  align-items: baseline;
}
.pill b { color: var(--gold-light); font-size: 17px; }

/* ── Main layout ── */
.main {
  width: 100%;
  max-width: 780px;
  padding: 0 16px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* ── Drop zone (felt table) ── */
.felt-table {
  width: 100%;
  background: radial-gradient(ellipse at 50% 40%, #237046, var(--felt) 60%, var(--felt-dark));
  border: 3px solid var(--gold);
  border-radius: 24px;
  padding: 20px;
  box-shadow: inset 0 0 40px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.6);
  position: relative;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
  perspective: 800px;
}

.felt-label {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,255,255,.3);
  letter-spacing: .2em;
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── Card slots ── */
.cards-row {
  display: flex;
  gap: clamp(10px, 3vw, 20px);
  justify-content: center;
  align-items: flex-end;
  min-height: 160px;
  position: relative;
  transform-style: preserve-3d;
}

/* ── Single card ── */
.card-wrap {
  perspective: 600px;
  width: clamp(72px, 18vw, 100px);
  height: clamp(108px, 27vw, 150px);
  position: relative;
}

.card {
  width: 100%;
  height: 100%;
  position: relative;
  border-radius: 10px;
  cursor: default;
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 2px 4px 12px rgba(0,0,0,.5);
}

/* Mặt sau luôn nằm trên (z-index cao hơn) → mặt úp theo mặc định */
.card-back  { z-index: 1; }
.card-front { z-index: 0; }

/* Khi lật xong: đưa mặt trước lên trên */
.card.face-up .card-front { z-index: 2; }
.card.face-up .card-back  { z-index: 0; }

/* front = shown side */
.card-front {
  background: var(--cream);
  flex-direction: column;
  gap: 4px;
}

.card-front.red-face { color: var(--red); }
.card-front.black-face { color: #1a1a1a; }

.card-pip-tl {
  position: absolute;
  top: 5px;
  left: 7px;
  font-size: clamp(12px, 3vw, 16px);
  font-weight: 700;
  line-height: 1;
}
.card-pip-br {
  position: absolute;
  bottom: 5px;
  right: 7px;
  font-size: clamp(12px, 3vw, 16px);
  font-weight: 700;
  line-height: 1;
  transform: rotate(180deg);
}
.card-center-sym {
  font-size: clamp(32px, 9vw, 52px);
  line-height: 1;
}

/* back = pattern */
.card-back {
  background: linear-gradient(135deg, #1a3a6b, #0d2044);
  border: 2px solid rgba(255,255,255,.15);
  overflow: hidden;
}
.card-back::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 6px;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 6px,
    rgba(255,255,255,.04) 6px,
    rgba(255,255,255,.04) 12px
  );
}

/* ── Result badge ── */
.result-badge {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%) scale(0);
  background: linear-gradient(135deg, var(--gold), #c87f0a);
  color: #1a0a00;
  font-weight: 900;
  font-size: clamp(22px, 6vw, 36px);
  padding: 8px 32px;
  border-radius: 999px;
  box-shadow: 0 4px 20px rgba(240,192,64,.5);
  letter-spacing: .08em;
  white-space: nowrap;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1);
  z-index: 10;
  font-family: "Times New Roman", Georgia, serif;
}
.result-badge.show { transform: translateX(-50%) scale(1); }

/* ── Count chips ── */
.count-row {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}
.count-chip {
  background: rgba(0,0,0,.35);
  border-radius: 12px;
  padding: 10px 22px;
  text-align: center;
  border: 2px solid transparent;
  min-width: 90px;
  transition: border-color .3s, box-shadow .3s;
}
.count-chip.red-chip { border-color: var(--red); }
.count-chip.black-chip { border-color: #444; }
.count-chip span { display: block; font-size: 11px; color: rgba(255,255,255,.5); letter-spacing: .1em; text-transform: uppercase; }
.count-chip b { font-size: 28px; font-variant-numeric: tabular-nums; }
.count-chip.red-chip b { color: #e74c3c; }
.count-chip.black-chip b { color: #aaa; }
.count-chip.winner { box-shadow: 0 0 16px 3px currentColor; }

/* ── History ── */
.history-title {
  font-size: 12px;
  letter-spacing: .25em;
  color: rgba(255,255,255,.4);
  text-transform: uppercase;
  align-self: flex-start;
  padding-left: 4px;
}
.history-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  width: 100%;
}
.hist-badge {
  padding: 4px 14px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: .05em;
}
.hist-tai { background: rgba(192,57,43,.25); border: 1px solid var(--red); color: #e74c3c; }
.hist-xiu { background: rgba(50,50,80,.35); border: 1px solid #666; color: #bbb; }
.hist-even { background: rgba(50,120,50,.25); border: 1px solid #3a8; color: #4db; }

/* ── Roll button ── */
.btn-roll {
  padding: 16px 48px;
  font-size: clamp(18px, 4vw, 24px);
  font-weight: 800;
  font-family: "Times New Roman", Georgia, serif;
  background: linear-gradient(135deg, #b8860b, var(--gold) 50%, #b8860b);
  color: #1a0a00;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  letter-spacing: .08em;
  box-shadow: 0 6px 24px rgba(240,192,64,.35), 0 2px 0 #7a5800;
  transition: transform .15s, box-shadow .15s;
  position: relative;
  overflow: hidden;
  min-width: 200px;
}
.btn-roll::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,.2), transparent 60%);
  border-radius: inherit;
}
.btn-roll:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(240,192,64,.45), 0 2px 0 #7a5800; }
.btn-roll:active:not(:disabled) { transform: translateY(1px); box-shadow: 0 2px 8px rgba(240,192,64,.25); }
.btn-roll:disabled { opacity: .5; cursor: not-allowed; }

/* ── Sequences selector ── */
.seq-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 6px;
  width: 100%;
}
.seq-group-hdr {
  grid-column: 1 / -1;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  padding: 6px 2px 2px;
  border-top: 1px solid rgba(255,255,255,.08);
  margin-top: 2px;
}
.seq-group-hdr:first-child { border-top: none; margin-top: 0; }
.seq-hdr-tai  { color: #e74c3c; border-color: rgba(231,76,60,.3); }
.seq-hdr-xiu  { color: #9b9bc0; border-color: rgba(100,100,160,.3); }
.seq-hdr-even { color: #4db;    border-color: rgba(51,180,150,.3); }

.seq-btn {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px;
  color: var(--cream);
  font-size: 13px;
  padding: 8px 6px;
  cursor: pointer;
  transition: background .2s, border-color .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.seq-btn:hover  { background: rgba(255,255,255,.12); border-color: var(--gold); }
.seq-btn.active { background: rgba(240,192,64,.12);  border-color: var(--gold); box-shadow: 0 0 8px rgba(240,192,64,.25); }
.seq-btn.next-up { border-color: rgba(255,255,255,.35); box-shadow: 0 0 6px rgba(255,255,255,.15); }
.seq-btn .seq-num {
  font-size: 9px;
  color: rgba(255,255,255,.3);
  letter-spacing: .05em;
  align-self: flex-start;
  line-height: 1;
}
.seq-btn .seq-pips {
  display: flex;
  gap: 2px;
  font-size: 15px;
  line-height: 1;
}
.seq-btn .seq-result {
  font-size: 11px;
  font-weight: 700;
}
.seq-btn .tai  { color: #e74c3c; }
.seq-btn .xiu  { color: #9b9bc0; }
.seq-btn .even { color: #4db; }

.section-title {
  font-size: 12px;
  letter-spacing: .25em;
  color: rgba(255,255,255,.4);
  text-transform: uppercase;
  align-self: flex-start;
  padding-left: 4px;
  margin-top: 4px;
}

/* ── Preset toolbar ── */
.preset-toolbar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  width: 100%;
  align-items: center;
}
.tb-btn {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: var(--cream);
  font-size: 12px;
  padding: 6px 12px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  white-space: nowrap;
}
.tb-btn:hover { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.3); }
.tb-btn.on    { background: rgba(240,192,64,.15); border-color: var(--gold); color: var(--gold-light); }
.tb-sep { flex: 1; }


/* ── Rule popup (fixed top-right) ── */
.btn-rule-fab {
  position: fixed;
  top: 12px;
  right: 58px; /* dịch sang trái để nhường chỗ cho nút mute (game-sound.js) */
  background: rgba(20,10,4,.75);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 999px;
  color: rgba(255,255,255,.5);
  font-size: 13px;
  padding: 6px 14px;
  cursor: pointer;
  z-index: 200;
  backdrop-filter: blur(6px);
  transition: border-color .15s, color .15s;
  white-space: nowrap;
}
.btn-rule-fab:hover        { border-color: rgba(255,255,255,.4); color: var(--cream); }
.btn-rule-fab.open         { border-color: var(--gold); color: var(--gold-light); }

.rule-popup {
  position: fixed;
  top: 46px;
  right: 14px;
  width: 260px;
  background: #17100a;
  border: 1px solid var(--gold);
  border-radius: 14px;
  padding: 14px;
  z-index: 199;
  display: none;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,.7);
}
.rule-popup.show { display: flex; }
.rule-popup-title {
  font-size: 11px;
  letter-spacing: .15em;
  color: rgba(255,255,255,.35);
  text-transform: uppercase;
  margin-bottom: 2px;
}
.rule-option {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 10px 12px;
  border-radius: 9px;
  border: 1px solid rgba(255,255,255,.1);
  background: transparent;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  text-align: left;
  width: 100%;
}
.rule-option:hover        { background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.25); }
.rule-option.on           { background: rgba(240,192,64,.1); border-color: var(--gold); }
.rule-option-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--cream);
}
.rule-option.on .rule-option-name { color: var(--gold-light); }
.rule-option-hint {
  font-size: 11px;
  color: rgba(255,255,255,.45);
  line-height: 1.5;
}

.rule-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  width: 100%;
  padding: 4px 0;
}
.rule-label { color: rgba(255,255,255,.45); font-size: 12px; letter-spacing: .08em; white-space: nowrap; margin-right: 4px; }
.rule-btn {
  padding: 6px 14px;
  font-size: 13px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 6px;
  color: var(--cream);
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
  user-select: none;
}
.rule-btn:hover { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.3); }
.rule-btn.on { background: rgba(240,192,64,.15); border-color: var(--gold); color: var(--gold-light); }

/* Edit mode: pip toggles */
.seq-btn.editing { cursor: default; }
.seq-btn.editing:hover { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.1); }
.pip-toggle {
  cursor: pointer;
  font-size: 17px;
  line-height: 1;
  padding: 1px;
  border-radius: 3px;
  transition: transform .1s;
  user-select: none;
}
.pip-toggle:hover { transform: scale(1.3); }

/* Toast notification */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: rgba(20,20,20,.92);
  border: 1px solid rgba(255,255,255,.15);
  color: var(--cream);
  font-size: 13px;
  padding: 10px 22px;
  border-radius: 999px;
  pointer-events: none;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  opacity: 0;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Animation keyframes ── */
/* Không cần rotateY — mặt úp được đảm bảo bởi z-index của .card-back */
@keyframes cardFallIn {
  0%   { transform: translateY(-420px) rotateZ(var(--spin, 0deg)); opacity: 0; }
  54%  { transform: translateY(14px)   rotateZ(0deg);               opacity: 1; }
  72%  { transform: translateY(-9px); }
  87%  { transform: translateY(4px); }
  100% { transform: translateY(0); }
}

/* waiting: .card-back z-index cao hơn đã giữ mặt úp — không cần thêm gì */

/* falling */
.card.falling {
  animation: cardFallIn var(--fall-dur, 0.6s) cubic-bezier(.36,.07,.19,.97) both;
}

/* ── Responsive ── */
@media (max-width: 420px) {
  .seq-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>

<header>
  <h1>Tài Xỉu <small>Bốn Lá Bài</small></h1>
</header>

<div class="topbar">
  <div class="pill">Ván: <b id="roundNum">0</b></div>
  <div class="pill">Tài: <b id="statTai">0</b></div>
  <div class="pill">Xỉu: <b id="statXiu">0</b></div>
  <div class="pill">Hoà: <b id="statEven">0</b></div>
</div>

<div class="main">

  <!-- Felt table + cards -->
  <div class="felt-table">
    <span class="felt-label">♠ Bàn chơi ♠</span>
    <div class="cards-row" id="cardsRow">
      <div class="card-wrap"><div class="card waiting" id="c0"><div class="card-face card-front" id="cf0"></div><div class="card-face card-back"></div></div></div>
      <div class="card-wrap"><div class="card waiting" id="c1"><div class="card-face card-front" id="cf1"></div><div class="card-face card-back"></div></div></div>
      <div class="card-wrap"><div class="card waiting" id="c2"><div class="card-face card-front" id="cf2"></div><div class="card-face card-back"></div></div></div>
      <div class="card-wrap"><div class="card waiting" id="c3"><div class="card-face card-front" id="cf3"></div><div class="card-face card-back"></div></div></div>
    </div>
    <div class="result-badge" id="resultBadge"></div>
  </div>

  <!-- Count chips -->
  <div class="count-row">
    <div class="count-chip red-chip" id="chipRed"><span>Mặt Đỏ</span><b id="cntRed">–</b></div>
    <div class="count-chip black-chip" id="chipBlack"><span>Mặt Đen</span><b id="cntBlack">–</b></div>
  </div>

  <!-- Roll button -->
  <button class="btn-roll" id="btnRoll" onclick="rollNext()">🎴 Rút Bài</button>

  <!-- History -->
  <span class="history-title">Lịch sử</span>
  <div class="history-row" id="historyRow"></div>

</div>

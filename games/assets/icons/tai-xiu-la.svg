<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="bg-cards" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg-cards)"/>
  <!-- Felt texture overlay -->
  <rect width="80" height="80" rx="20" fill="rgba(0,0,0,0.08)"/>
  <!-- Card shadow (back-left) -->
  <g transform="translate(40,46) rotate(-24)">
    <rect x="-14" y="-22" width="28" height="38" rx="4" fill="rgba(0,0,0,0.3)"/>
  </g>
  <!-- Card back-left (-24°) black suit -->
  <g transform="translate(40,46) rotate(-24)">
    <rect x="-14" y="-22" width="28" height="38" rx="4" fill="white"/>
    <rect x="-14" y="-22" width="28" height="38" rx="4" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
    <!-- Spade top-left -->
    <path d="M-10,-16 C-10,-16 -13,-18.5 -13,-21 C-13,-22.5 -11.5,-23 -10,-21.5 C-8.5,-23 -7,-22.5 -7,-21 C-7,-18.5 -10,-16 -10,-16 Z M-10.7,-16 L-9.3,-16 L-9.3,-14 L-11,-14 Z" fill="#1e293b" transform="scale(0.75)"/>
    <!-- Spade center -->
    <path d="M0,6 C0,6 -8,0 -8,-5 C-8,-9 -4.5,-10.5 0,-7 C4.5,-10.5 8,-9 8,-5 C8,0 0,6 0,6 Z M-2,6 L2,6 L2,10 L-2,10 Z" fill="#1e293b"/>
  </g>
  <!-- Card shadow (back-right) -->
  <g transform="translate(40,46) rotate(24)">
    <rect x="-14" y="-22" width="28" height="38" rx="4" fill="rgba(0,0,0,0.3)"/>
  </g>
  <!-- Card back-right (+24°) red suit -->
  <g transform="translate(40,46) rotate(24)">
    <rect x="-14" y="-22" width="28" height="38" rx="4" fill="white"/>
    <!-- Diamond center -->
    <path d="M0,-5 L7,4 L0,13 L-7,4 Z" fill="#dc2626"/>
    <!-- Diamond top-left -->
    <path d="M-10,-17 L-7,-14 L-10,-11 L-13,-14 Z" fill="#dc2626" transform="scale(0.5) translate(-10,-8)"/>
  </g>
  <!-- Card front shadow -->
  <rect x="26" y="15" width="28" height="40" rx="4" fill="rgba(0,0,0,0.3)" transform="translate(2,2)"/>
  <!-- Card front (center, upright) -->
  <rect x="26" y="15" width="28" height="40" rx="4" fill="white"/>
  <rect x="26" y="15" width="28" height="40" rx="4" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>
  <!-- Large red heart — perfectly symmetric around x=40 -->
  <path d="M40,50
    C40,50 28,40 28,31
    C28,25 34,22.5 40,28.5
    C46,22.5 52,25 52,31
    C52,40 40,50 40,50 Z"
    fill="#dc2626"/>
  <!-- Small heart top-left corner — symmetric around x=30 -->
  <path d="M30,24 C30,24 27,21 27,19 C27,17 28.7,16 30,18 C31.3,16 33,17 33,19 C33,21 30,24 30,24 Z" fill="#dc2626"/>
  <!-- Small heart bottom-right inverted — symmetric around x=50 -->
  <path d="M50,47 C50,47 53,50 53,52 C53,54 51.3,55 50,53 C48.7,55 47,54 47,52 C47,50 50,47 50,47 Z" fill="#dc2626"/>
</svg>

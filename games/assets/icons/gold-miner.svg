<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="bg-gm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gm-gold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="gm-silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg-gm)"/>

  <!-- Ground strip at bottom -->
  <rect x="0" y="63" width="80" height="17" fill="rgba(0,0,0,0.22)"/>
  <rect x="0" y="71" width="80" height="9"  fill="rgba(0,0,0,0.18)"/>

  <!-- Pickaxe handle (thick, diagonal, wood layered) -->
  <line x1="14" y1="67" x2="50" y2="26" stroke="#451a03" stroke-width="9" stroke-linecap="round"/>
  <line x1="14" y1="67" x2="50" y2="26" stroke="#92400e" stroke-width="6" stroke-linecap="round"/>
  <!-- Wood grain highlight -->
  <line x1="16" y1="64" x2="49" y2="29" stroke="rgba(255,200,100,0.25)" stroke-width="2" stroke-linecap="round"/>

  <!-- Pickaxe head: broad left blade (main digging edge) -->
  <path d="M50,26 L33,11 C31,5 47,3 53,12 Z" fill="url(#gm-silver)"/>
  <!-- Pickaxe head: right pointed spike -->
  <path d="M50,26 L66,12 L61,7 Z" fill="#d1d5db"/>
  <!-- Metal head shine -->
  <line x1="36" y1="9" x2="51" y2="15" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <!-- Blade edge highlight -->
  <line x1="33" y1="11" x2="44" y2="8" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Gold nugget (lower-right, large) -->
  <circle cx="57" cy="61" r="14" fill="url(#gm-gold)"/>
  <!-- Nugget rim -->
  <circle cx="57" cy="61" r="14" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <!-- Surface bump / facet -->
  <circle cx="62" cy="65" r="5" fill="#fbbf24" opacity="0.55"/>
  <!-- Nugget highlight (top-left shine) -->
  <ellipse cx="51" cy="53" rx="5.5" ry="3.5" fill="rgba(255,255,255,0.55)" transform="rotate(-25 51 53)"/>

  <!-- Small diamond gem (upper-right accent) -->
  <polygon points="68,20 75,30 68,40 61,30" fill="#67e8f9"/>
  <polygon points="68,20 75,30 68,30"       fill="#a5f3fc"/>
  <line x1="61" y1="30" x2="75" y2="30"    stroke="rgba(255,255,255,0.35)" stroke-width="1"/>

  <!-- Sparkle cross near gold -->
  <line x1="43" y1="53" x2="43" y2="46" stroke="#fde047" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="39.5" y1="49.5" x2="46.5" y2="49.5" stroke="#fde047" stroke-width="2.5" stroke-linecap="round"/>
</svg>

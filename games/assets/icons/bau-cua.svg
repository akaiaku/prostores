<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="bg-baucua" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a3412"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg-baucua)"/>

  <!-- Left big claw arm -->
  <path d="M21,41 Q9,34 7,23 L13,22 L17,34 Z" fill="rgba(255,255,255,0.88)"/>
  <!-- Left claw pincer top -->
  <circle cx="9" cy="21" r="6" fill="rgba(255,255,255,0.9)"/>
  <!-- Left claw pincer bottom -->
  <circle cx="15" cy="16" r="5" fill="rgba(255,255,255,0.82)"/>

  <!-- Right big claw arm -->
  <path d="M59,41 Q71,34 73,23 L67,22 L63,34 Z" fill="rgba(255,255,255,0.88)"/>
  <!-- Right claw pincer top -->
  <circle cx="71" cy="21" r="6" fill="rgba(255,255,255,0.9)"/>
  <!-- Right claw pincer bottom -->
  <circle cx="65" cy="16" r="5" fill="rgba(255,255,255,0.82)"/>

  <!-- Body -->
  <ellipse cx="40" cy="47" rx="19" ry="15" fill="rgba(255,255,255,0.93)"/>
  <!-- Shell rings -->
  <ellipse cx="40" cy="47" rx="14" ry="10" fill="none" stroke="rgba(180,80,20,0.25)" stroke-width="1.5"/>
  <ellipse cx="40" cy="47" rx="8"  ry="5.5" fill="none" stroke="rgba(180,80,20,0.18)" stroke-width="1"/>

  <!-- Head -->
  <ellipse cx="40" cy="31" rx="11" ry="9" fill="rgba(255,255,255,0.93)"/>

  <!-- Eye stalks -->
  <line x1="35" y1="24" x2="32" y2="19" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="45" y1="24" x2="48" y2="19" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
  <!-- Eye balls -->
  <circle cx="31" cy="18" r="5" fill="rgba(255,255,255,0.95)"/>
  <circle cx="49" cy="18" r="5" fill="rgba(255,255,255,0.95)"/>
  <!-- Pupils -->
  <circle cx="31" cy="18" r="2.5" fill="#1c1c1c"/>
  <circle cx="49" cy="18" r="2.5" fill="#1c1c1c"/>
  <!-- Eye shine -->
  <circle cx="32.2" cy="16.8" r="1" fill="white"/>
  <circle cx="50.2" cy="16.8" r="1" fill="white"/>

  <!-- Left legs -->
  <line x1="23" y1="46" x2="10" y2="52" stroke="rgba(255,255,255,0.85)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="22" y1="51" x2="9"  y2="59" stroke="rgba(255,255,255,0.85)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="23" y1="56" x2="12" y2="65" stroke="rgba(255,255,255,0.8)"  stroke-width="3"   stroke-linecap="round"/>

  <!-- Right legs -->
  <line x1="57" y1="46" x2="70" y2="52" stroke="rgba(255,255,255,0.85)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="58" y1="51" x2="71" y2="59" stroke="rgba(255,255,255,0.85)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="57" y1="56" x2="68" y2="65" stroke="rgba(255,255,255,0.8)"  stroke-width="3"   stroke-linecap="round"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border-radius: 8px;
    overflow: hidden;
  }
  canvas {
    display: block;
    touch-action: none;
    cursor: pointer;
  }
  #hint {
    position: absolute;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255,255,255,0.65);
    font-size: 13px;
    letter-spacing: 1px;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="400" height="600"></canvas>
  <div id="hint">CLICK / TAP / SPACE to flap</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---- Game constants ----
const GRAVITY = 0.35;
const FLAP = -7.0;
const PIPE_W = 64;
const GAP = 170;
const PIPE_SPEED = 1.9;
const PIPE_INTERVAL = 125; // frames between pipes
const GROUND_H = 90;

// ---- State ----
let state = 'start'; // 'start' | 'play' | 'over'
let bird, pipes, frame, score, best = 0, flashAlpha = 0;

function reset() {
  bird = { x: 110, y: H/2, vy: 0, r: 14, rot: 0 };
  pipes = [];
  frame = 0;
  score = 0;
  flashAlpha = 0;
}
reset();

// ---- Input ----
function flap() {
  if (state === 'start') { state = 'play'; bird.vy = FLAP; }
  else if (state === 'play') { bird.vy = FLAP; }
  else if (state === 'over') { reset(); state = 'start'; }
}
// pointerdown covers mouse, touch, and pen in one event (no double-firing)
window.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });
// fallback for any browser that doesn't emit pointer events
canvas.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });

function onKey(e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === ' ') {
    e.preventDefault();
    flap();
  }
}
window.addEventListener('keydown', onKey);
document.addEventListener('keydown', onKey);
// grab keyboard focus so Space works inside a sandboxed frame
window.focus();
canvas.addEventListener('click', () => window.focus());

// ---- Pipe spawning ----
function spawnPipe() {
  const minTop = 60;
  const maxTop = H - GROUND_H - GAP - 60;
  const topH = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x: W, top: topH, passed: false });
}

// ---- Collision ----
function hitPipe(p) {
  const bx = bird.x, by = bird.y, r = bird.r;
  const inX = bx + r > p.x && bx - r < p.x + PIPE_W;
  if (!inX) return false;
  const inGap = by - r > p.top && by + r < p.top + GAP;
  return !inGap;
}

// ---- Update ----
function update() {
  if (state === 'play') {
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.rot = Math.max(-0.5, Math.min(1.4, bird.vy * 0.07));

    if (frame % PIPE_INTERVAL === 0) spawnPipe();
    frame++;

    for (const p of pipes) {
      p.x -= PIPE_SPEED;
      if (!p.passed && p.x + PIPE_W < bird.x) {
        p.passed = true;
        score++;
      }
      if (hitPipe(p)) gameOver();
    }
    pipes = pipes.filter(p => p.x + PIPE_W > -10);

    // ground / ceiling
    if (bird.y + bird.r >= H - GROUND_H) { bird.y = H - GROUND_H - bird.r; gameOver(); }
    if (bird.y - bird.r < 0) { bird.y = bird.r; bird.vy = 0; }
  } else if (state === 'start') {
    bird.y = H/2 + Math.sin(frame * 0.06) * 8;
    frame++;
  } else if (state === 'over') {
    if (bird.y + bird.r < H - GROUND_H) {
      bird.vy += GRAVITY;
      bird.y += bird.vy;
      bird.rot = Math.min(1.57, bird.rot + 0.08);
    } else {
      bird.y = H - GROUND_H - bird.r;
    }
  }
  if (flashAlpha > 0) flashAlpha -= 0.04;
}

function gameOver() {
  if (state !== 'play') return;
  state = 'over';
  flashAlpha = 0.8;
  best = Math.max(best, score);
}

// ---- Drawing ----
let groundOffset = 0;
function drawBackground() {
  // sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#4ec0ca');
  g.addColorStop(1, '#9be7d8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // clouds
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  for (let i = 0; i < 3; i++) {
    const cx = ((frame * 0.3 + i * 160) % (W + 120)) - 60;
    const cy = 80 + i * 70;
    cloud(cx, cy, 1 - i * 0.15);
  }
}
function cloud(x, y, s) {
  ctx.beginPath();
  ctx.arc(x, y, 22*s, 0, 7);
  ctx.arc(x+24*s, y+4*s, 18*s, 0, 7);
  ctx.arc(x-22*s, y+6*s, 16*s, 0, 7);
  ctx.fill();
}

function drawPipe(p) {
  const x = p.x;
  // body gradient
  const grad = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
  grad.addColorStop(0, '#5aa83a');
  grad.addColorStop(0.4, '#7ec850');
  grad.addColorStop(0.6, '#7ec850');
  grad.addColorStop(1, '#4a8f30');
  ctx.fillStyle = grad;

  // top pipe
  ctx.fillRect(x, 0, PIPE_W, p.top);
  // bottom pipe
  const by = p.top + GAP;
  ctx.fillRect(x, by, PIPE_W, H - GROUND_H - by);

  // lips
  ctx.fillStyle = '#3f7a28';
  ctx.fillRect(x - 4, p.top - 24, PIPE_W + 8, 24);
  ctx.fillRect(x - 4, by, PIPE_W + 8, 24);
  ctx.fillStyle = grad;
  ctx.fillRect(x - 1, p.top - 22, PIPE_W + 2, 20);
  ctx.fillRect(x - 1, by + 2, PIPE_W + 2, 20);
}

function drawGround() {
  const y = H - GROUND_H;
  ctx.fillStyle = '#ded895';
  ctx.fillRect(0, y, W, GROUND_H);
  ctx.fillStyle = '#caa869';
  ctx.fillRect(0, y, W, 14);
  // moving stripes
  ctx.fillStyle = '#b89455';
  groundOffset = (groundOffset + (state === 'play' ? PIPE_SPEED : 1)) % 28;
  for (let x = -28; x < W + 28; x += 28) {
    ctx.beginPath();
    ctx.moveTo(x - groundOffset, y + 14);
    ctx.lineTo(x - groundOffset + 14, y + 14);
    ctx.lineTo(x - groundOffset + 7, y + 26);
    ctx.fill();
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot);

  // body
  ctx.fillStyle = '#ffd24a';
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.r + 2, bird.r, 0, 0, 7);
  ctx.fill();
  ctx.strokeStyle = '#e0a92e';
  ctx.lineWidth = 2;
  ctx.stroke();

  // wing
  ctx.fillStyle = '#fff';
  const wf = state === 'play' ? Math.sin(frame * 0.4) * 4 : Math.sin(frame * 0.1) * 3;
  ctx.beginPath();
  ctx.ellipse(-3, 2 + wf, 8, 5, -0.3, 0, 7);
  ctx.fill();
  ctx.strokeStyle = '#e0a92e';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8, -5, 5, 0, 7);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(9.5, -5, 2.4, 0, 7);
  ctx.fill();

  // beak
  ctx.fillStyle = '#f07a2e';
  ctx.beginPath();
  ctx.moveTo(13, -1);
  ctx.lineTo(24, 1);
  ctx.lineTo(13, 5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawText(text, x, y, size, color, stroke) {
  ctx.font = `bold ${size}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = size * 0.14;
  ctx.strokeStyle = stroke || '#000';
  ctx.fillStyle = color || '#fff';
  ctx.strokeText(text, x, y);
  ctx.fillText(text, x, y);
}

function panel(x, y, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  roundRect(x, y, w, h, 14);
  ctx.fill();
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function drawUI() {
  if (state === 'play') {
    drawText(score, W/2, 80, 56, '#fff');
  } else if (state === 'start') {
    drawText('FLAPPY', W/2, 150, 52, '#ffd24a');
    drawText('BIRD', W/2, 205, 52, '#ffd24a');
    panel(W/2 - 130, 360, 260, 60);
    drawText('TAP TO START', W/2, 390, 24, '#fff');
  } else if (state === 'over') {
    panel(W/2 - 130, 200, 260, 180);
    drawText('GAME OVER', W/2, 240, 34, '#ff5a5a');
    drawText('SCORE  ' + score, W/2, 295, 22, '#fff');
    drawText('BEST   ' + best, W/2, 330, 22, '#ffd24a');
    drawText('TAP TO RETRY', W/2, 412, 20, '#fff');
  }
}

function drawFlash() {
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ---- Main loop ----
function loop() {
  update();
  drawBackground();
  for (const p of pipes) drawPipe(p);
  drawGround();
  drawBird();
  drawFlash();
  drawUI();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

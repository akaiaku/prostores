<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <title>Games — ProStores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-blue: #4f8ef7;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-green: #22d3a0;
            --accent-orange: #fb923c;
            --text-primary: rgba(255,255,255,0.95);
            --text-secondary: rgba(255,255,255,0.6);
            --radius-xl: 24px;
            --radius-2xl: 32px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Aurora background ── */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: drift 18s ease-in-out infinite alternate;
        }

        .aurora-blob:nth-child(1) {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #c2410c, transparent 70%);
            top: -150px; left: -150px;
            animation-duration: 20s;
        }
        .aurora-blob:nth-child(2) {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #7c3aed, transparent 70%);
            top: 40%; right: -100px;
            animation-duration: 25s;
            animation-delay: -5s;
        }
        .aurora-blob:nth-child(3) {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #b45309, transparent 70%);
            bottom: -80px; left: 35%;
            animation-duration: 22s;
            animation-delay: -10s;
        }

        @keyframes drift {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(60px, -80px) scale(1.1); }
            66%  { transform: translate(-40px, 60px) scale(0.95); }
            100% { transform: translate(30px, -30px) scale(1.05); }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
        }

        /* ── Layout ── */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 80px;
        }

        /* ── Navbar ── */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            margin: 0 -24px 0;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .navbar-brand {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-back {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .navbar-back:hover {
            background: rgba(255,255,255,0.13);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        /* ── Hero ── */
        .hero {
            text-align: center;
            padding: 80px 0 56px;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-orange);
            background: rgba(251, 146, 60, 0.1);
            border: 1px solid rgba(251, 146, 60, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 28px;
            animation: fadeInDown 0.6s ease both;
        }

        .hero h1 {
            font-size: clamp(2.4rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2px;
            margin-bottom: 16px;
            animation: fadeInDown 0.6s 0.1s ease both;
        }

        .grad-text {
            background: linear-gradient(135deg, #fb923c 0%, #f59e0b 50%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-sub {
            font-size: 1.05rem;
            color: var(--text-secondary);
            max-width: 460px;
            margin: 0 auto;
            line-height: 1.7;
            font-weight: 400;
            animation: fadeInDown 0.6s 0.2s ease both;
        }

        /* ── Section title ── */
        .section-label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 48px 0 28px;
        }

        .section-label-text {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .section-label-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.12), transparent);
        }

        /* ── Grid ── */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        /* ── Game Card ── */
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-2xl);
            padding: 32px 28px;
            position: relative;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.4s ease,
                        border-color 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 24px 50px rgba(251,146,60,0.25), 0 0 0 1px rgba(251,146,60,0.3);
        }

        .game-icon-wrap {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, #fb923c, #f59e0b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(251,146,60,0.3);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .game-card:hover .game-icon-wrap {
            transform: scale(1.08) rotate(-2deg);
        }

        .game-title {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .game-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .tag {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .tag-orange { background: rgba(251,146,60,0.15);  color: #fdba74;  border: 1px solid rgba(251,146,60,0.25); }
        .tag-green  { background: rgba(34,211,160,0.15);  color: #6ee7b7;  border: 1px solid rgba(34,211,160,0.25); }

        .tag-new {
            background: linear-gradient(135deg, rgba(251,146,60,0.2), rgba(236,72,153,0.2));
            color: #fdba74;
            border: 1px solid rgba(251,146,60,0.35);
            animation: glow-new 2.5s ease infinite;
        }

        @keyframes glow-new {
            0%, 100% { box-shadow: 0 0 0 rgba(251,146,60,0); }
            50%       { box-shadow: 0 0 10px rgba(251,146,60,0.4); }
        }

        .card-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 16px 0;
        }

        .game-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 22px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fb923c, #f59e0b);
            color: #0a0a0f;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(251,146,60,0.35);
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(251,146,60,0.5);
        }

        /* ── Animations ── */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: none; }
        }

        .reveal {
            opacity: 0;
            transform: translateY(32px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: none;
        }

        .reveal:nth-child(2) { transition-delay: 0.1s; }
        .reveal:nth-child(3) { transition-delay: 0.2s; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .hero { padding: 56px 0 40px; }
            .games-grid { grid-template-columns: 1fr; }
            .navbar { padding: 14px 20px; }
        }
    </style>
</head>
<body>
    <div class="aurora" aria-hidden="true">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>

    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">⚡ ProStores</a>
        <div class="navbar-right">
            <a href="../index.html" class="navbar-back">← Back</a>
        </div>
    </nav>

    <div class="container">
        <header class="hero">
            <div class="hero-eyebrow">🎮 Mini Games</div>
            <h1><span class="grad-text">Games</span></h1>
            <p class="hero-sub">Fun browser games — play instantly, no download needed.</p>
        </header>

        <div class="section-label">
            <span class="section-label-text">All Games</span>
            <span class="section-label-line"></span>
        </div>

        <div class="games-grid">

            <!-- Flappy Bird -->
            <a href="flappy-bird/flappy-bird.html" class="game-card reveal">
                <div class="game-icon-wrap">🐦</div>
                <div class="game-title">Flappy Bird</div>
                <div class="game-tags">
                    <span class="tag tag-orange">Arcade</span>
                    <span class="tag tag-green">Free</span>
                    <span class="tag tag-new">✦ NEW</span>
                </div>
                <div class="card-divider"></div>
                <p class="game-description">
                    The classic one-tap arcade game — guide your bird through the pipes and beat your high score. Simple controls, endless fun.
                </p>
                <span class="play-btn">▶ Play Now</span>
            </a>

        </div>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.08 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                card.style.transform = `translateY(-8px) rotateX(${-y * 5}deg) rotateY(${x * 5}deg) scale(1.01)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = '';
            });
        });
    </script>
</body>
</html>
